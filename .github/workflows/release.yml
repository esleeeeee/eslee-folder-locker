name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore .\FolderGate.sln

      - name: Build
        run: dotnet build .\FolderGate.sln -c Release --no-restore

      - name: Test core project
        run: dotnet test .\tests\FolderGate.Core.Tests\FolderGate.Core.Tests.csproj -c Release --no-build

      - name: Test app project
        run: dotnet test .\tests\FolderGate.App.Tests\FolderGate.App.Tests.csproj -c Release --no-build

      - name: Publish app
        run: dotnet publish .\src\FolderGate.App\FolderGate.App.csproj -c Release -r win-x64 --self-contained false -o .\artifacts\publish

      - name: Publish elevated helper
        run: dotnet publish .\src\FolderGate.ElevatedHelper\FolderGate.ElevatedHelper.csproj -c Release -r win-x64 --self-contained false -o .\artifacts\publish

      - name: Publish recovery tool
        run: dotnet publish .\src\FolderGate.RecoveryTool\FolderGate.RecoveryTool.csproj -c Release -r win-x64 --self-contained false -o .\artifacts\publish

      - name: Create Korean executable aliases
        shell: pwsh
        run: |
          Copy-Item .\artifacts\publish\FolderGate.App.exe .\artifacts\publish\이은성폴더잠금기.exe -Force
          Copy-Item .\artifacts\publish\FolderGate.ElevatedHelper.exe .\artifacts\publish\이은성폴더잠금기_권한도우미.exe -Force
          Copy-Item .\artifacts\publish\FolderGate.RecoveryTool.exe .\artifacts\publish\이은성폴더잠금기_복구도구.exe -Force

      - name: Package release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path .\artifacts\release -Force | Out-Null
          $assetName = "EunsungFolderLock-${{ github.ref_name }}-win-x64.zip"
          Compress-Archive -Path .\artifacts\publish\* -DestinationPath ".\artifacts\release\$assetName" -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: 이은성폴더잠금기 ${{ github.ref_name }}
          body: |
            초기 공개 릴리스입니다.

            압축을 풀고 이은성폴더잠금기.exe를 실행하세요.
            Windows에서 .NET 8 Desktop Runtime이 필요할 수 있습니다.
          files: .\artifacts\release\EunsungFolderLock-${{ github.ref_name }}-win-x64.zip
          make_latest: true
